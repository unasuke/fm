on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::423695832787:role/static-site-deploy-role
          aws-region: ap-northeast-1
      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # 6.0.1
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run build
      - run: aws s3 sync ./dist s3://static-site-unasuke-fm-0593cdfb --delete
      - run: aws cloudfront create-invalidation --distribution-id E3G47NBJ8FRVTF --paths "/*"
